<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/auth.js"></script>
    <style>
        .container { width: 350px; margin: auto; }
        .error { color: red; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Đăng ký</h2>

    <input id="name" placeholder="Họ tên">
    <div id="errName" class="error"></div>

    <input id="email" placeholder="Email">
    <div id="errEmail" class="error"></div>

    <input type="password" id="password" placeholder="Mật khẩu">
    <div id="errPass" class="error"></div>

    <input type="password" id="confirm" placeholder="Nhập lại mật khẩu">
    <div id="errConfirm" class="error"></div>

    <button onclick="register()">Đăng ký</button>
</div>

</body>
</html>
